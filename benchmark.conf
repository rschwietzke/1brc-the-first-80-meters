# Unified Benchmark Configuration
# This file defines the properties and matrix combinations for benchmarking.

# --- Global Variables ---
ITERATIONS = 3
# ------------------------

[JDKS]
# Format: LABEL = PATH_OR_SDKMAN_ID
JDK_21_OPEN = sdkman:21.0.6-tem

[GC_OPTS]
# Format: LABEL = JVM GC FLAGS
ZGC = -XX:+UseZGC
G1 = -XX:+UseG1GC
SGC = -XX:+UseSerialGC

[VM_OPTS]
# Format: LABEL = JVM MEMORY AND OTHER FLAGS
MEM_2G = -Xms2g -Xmx2g

[PROG_OPTS]
# Format: LABEL = APP ARGUMENTS
DEFAULT = -wc 0 -mc 1 -t 8

[BINDINGS]
# Format: LABEL = TASKSET PARAMS
CORES_8 = taskset -c 0-7
ALL = 

[DATASETS]
# Format: LABEL = PATH
DATASET_10k = 10000.txt

[RUN:JDK21]
JDK_FILTER = JDK_21_OPEN
GC_FILTER = *
VM_FILTER = MEM_2G
BINDING_FILTER = CORES_8
PROG_FILTER = DEFAULT
DATA_FILTER = *
CLASS_FILTER = org.onebrc.again.*
